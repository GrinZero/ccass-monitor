name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: ccass-monitor
          default-branch: main
          publish: true
          dry-run: false

      - name: Build
        if: steps.release.outputs.releases_created
        run: pnpm install && pnpm run build

      - name: Publish to npm
        if: steps.release.outputs.releases_created
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
